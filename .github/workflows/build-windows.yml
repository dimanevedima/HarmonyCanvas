name: Build Windows VST3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - "sidecar/**"
      - "web/**"
      - "bridge/**"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: read

jobs:
  build-vst3:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download WebView2 SDK
        run: nuget install Microsoft.Web.WebView2 -OutputDirectory webview2 -NonInteractive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bridge dependencies
        shell: pwsh
        run: |
          cd bridge
          npm ci --omit=dev

      - name: Build standalone sidecar
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check pyinstaller
          # bridge (transport-sync.mjs + its node_modules) is bundled as data so
          # the packaged sidecar can auto-launch the Ableton transport bridge —
          # see launch_transport_bridge() in sidecar/server.py. It still needs a
          # system Node.js on the machine running Ableton to actually run it.
          pyinstaller --noconfirm --clean --onefile --noconsole `
            --name HarmonyCanvasSidecar `
            --paths . `
            --add-data "web;web" `
            --add-data "sidecar/data;sidecar/data" `
            --add-data "bridge;bridge" `
            sidecar/server.py

      - name: Smoke-test packaged sidecar
        shell: pwsh
        run: |
          $data = Join-Path $env:RUNNER_TEMP "harmony-canvas-smoke.json"
          # --no-bridge: no Ableton is running in CI, so skip spawning the
          # transport bridge (it would just retry the connection forever).
          $process = Start-Process -WindowStyle Hidden -FilePath "dist/HarmonyCanvasSidecar.exe" `
            -ArgumentList "--port", "18787", "--data", $data, "--no-bridge" -PassThru
          try {
            $ready = $false
            foreach ($attempt in 1..60) {
              try {
                $health = Invoke-RestMethod "http://127.0.0.1:18787/api/health"
                $ready = $true
                break
              } catch {
                Start-Sleep -Milliseconds 250
              }
            }
            if (-not $ready) { throw "Packaged sidecar did not become ready" }
            $page = Invoke-WebRequest "http://127.0.0.1:18787/?focus=lab" -UseBasicParsing
            if ($page.StatusCode -ne 200 -or $page.Content -notmatch "lab-content") {
              throw "Packaged Harmony Lab page failed its smoke test"
            }
          } finally {
            Stop-Process -Id $process.Id -ErrorAction SilentlyContinue
          }

      - name: Configure JUCE project
        run: >-
          cmake
          -S plugin
          -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DJUCE_WEBVIEW2_PACKAGE_LOCATION="${{ github.workspace }}/webview2"

      - name: Build VST3
        run: cmake --build build --config Release --target HarmonyCanvas_VST3 --parallel 2

      - name: Package VST3
        shell: pwsh
        run: |
          $source = "build/HarmonyCanvas_artefacts/Release/VST3/Harmony Canvas.vst3"
          if (-not (Test-Path -LiteralPath $source)) {
            throw "VST3 bundle was not produced at $source"
          }
          $resources = Join-Path $source "Contents/Resources"
          New-Item -ItemType Directory -Path $resources -Force | Out-Null
          Copy-Item -LiteralPath "dist/HarmonyCanvasSidecar.exe" -Destination $resources
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          Copy-Item -LiteralPath $source -Destination artifact -Recurse

      - name: Upload Harmony Canvas VST3
        uses: actions/upload-artifact@v4
        with:
          name: HarmonyCanvas-Windows-VST3
          path: artifact/Harmony Canvas.vst3
          if-no-files-found: error
          retention-days: 14
